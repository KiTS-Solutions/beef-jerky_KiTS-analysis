                    - generic [ref=e897]: Physical-First. Digital-Amplified.
                  - paragraph [ref=e898]: 82.6% of MENA sports nutrition purchases are in-store. The handshake closes the deal. Digital is the megaphone that makes the handshake mean something before it happens.
                - generic [ref=e899]:
