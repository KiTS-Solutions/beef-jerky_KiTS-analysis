                - heading "The Strategy That Makes STRIKE a Trend" [level=2] [ref=e887]
                - paragraph [ref=e888]: A brand that is only known in the gym cannot scale. A brand that is felt on the street, seen on every feed, and spoken about in every WhatsApp group becomes a cultural fixture — and a cultural fixture sells itself. This is the framework for making STRIKE inevitable.
              - generic [ref=e890]:
                - generic [ref=e891]: STRATEGIC POSITION
                - paragraph [ref=e892]: STRIKE's go-to-market is correctly physical-first. This document does not change that. What it adds is the digital amplification layer that transforms a product sold in 30 gyms into a brand that 300,000 Lebanese fitness consumers know, want, and seek out — before they ever see it on a shelf.
