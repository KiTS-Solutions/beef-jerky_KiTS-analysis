        - heading "The Strategy That Makes STRIKE a Trend" [level=1] [ref=e1860]
        - paragraph [ref=e1862]: A brand that is only known in the gym cannot scale. A brand that is felt on the street, seen on every feed, and spoken about in every WhatsApp group becomes a cultural fixture — and a cultural fixture sells itself. STRIKE's go-to-market is correctly physical-first. This document adds the digital amplification layer that transforms a product sold in 30 gyms into a brand that 300,000 Lebanese fitness consumers know, want, and seek out.
        - generic [ref=e1863]: 6 Strategic Pillars
        - generic [ref=e1864]:
          - generic [ref=e1865]:
            - generic [ref=e1866]: Physical-First. Digital-Amplified.
            - text: 82.6% of MENA sports nutrition purchases are in-store. The handshake closes the deal. Digital is the megaphone that makes the handshake mean something before it happens.
          - generic [ref=e1867]:
            - generic [ref=e1868]: Build the Trend. Not Just the Brand.
            - text: Beef jerky is a non-essential snack. In Lebanon, non-essential wins when it feels inevitable — when everyone at the gym has seen it, talked about it, and wants to be the one who introduced it.
          - generic [ref=e1869]:
            - generic [ref=e1870]: Community Before Commerce.
            - text: Sell to the gym community, the trainer network, and the macro-tracking community — not to a generic audience. The first 1,000 customers build the brand more than any ad campaign.
          - generic [ref=e1871]:
            - generic [ref=e1872]: Organic Engine. Paid Accelerant.
            - text: Organic content builds the brand. Paid ads accelerate what's already working. Never run paid ads on content that hasn't proven organic traction first. This sequencing saves budget and improves ROAS 3×.
          - generic [ref=e1873]:
            - generic [ref=e1874]: WhatsApp is Your CRM.
            - text: In Lebanon, business happens on WhatsApp. A well-managed WhatsApp Business account is worth more than a sophisticated CRM system. Every customer interaction starts and ends there.
          - generic [ref=e1875]:
            - generic [ref=e1876]: Lebanese Pride. GCC-Ready From Day One.
            - text: Every piece of content should be producible in Arabic + English. Every digital asset should be structurally export-ready. The Lebanese story IS the GCC marketing asset — document it from the beginning.
