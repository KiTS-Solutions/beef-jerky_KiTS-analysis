              - text: — two parties making decisions in the same lane creates confusion in the market and with suppliers. Define the line in writing and we each stay on our side of it. We have done this before; a clean mandate is better for both parties.
              - generic [ref=e2330]: Structure & Scope
        - generic [ref=e2331]:
