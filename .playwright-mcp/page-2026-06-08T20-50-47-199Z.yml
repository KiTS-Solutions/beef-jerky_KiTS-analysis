          - generic [ref=e2296]:
            - generic [ref=e2297]: Q 1
            - generic [ref=e2298]: Why should I give full control to an advisory firm I just met?
          - generic [ref=e2299]:
            - generic [ref=e2300]: You are not giving control — you are authorizing execution within boundaries you define.
            - generic [ref=e2301]:
              - text: The mandate sets a fixed budget ceiling, a defined scope, and milestone-gated payment releases.
              - strong [ref=e2302]: No single tranche exceeds $18,000.
              - text: Every significant spend category is pre-disclosed in the investment breakdown you are holding. Ru'ya 360° cannot exceed the approved budget, cannot pivot the strategy, and cannot make contractual commitments outside the defined scope without your written consent. The mandate gives us the authority to move quickly — because in this market, slow execution is the only real risk.
              - generic [ref=e2303]: Control & Governance
        - generic [ref=e2304]:
          - generic [ref=e2305]:
            - generic [ref=e2306]: Q 2
            - generic [ref=e2307]: What happens if the product doesn't sell?
          - generic [ref=e2308]:
            - generic [ref=e2309]: The first accounts are placed on sale-or-return. STRIKE does not lose shelf space investment if units don't move.
            - generic [ref=e2310]:
              - text: Phase 0 prioritizes gyms and sports nutrition outlets on consignment terms —
              - strong [ref=e2311]: STRIKE takes back unsold stock and pays nothing for the shelf time.
              - text: This means the first 8–12 weeks generate real sell-through data before any capital risk scales. If the product does not perform within expected parameters at the first 5 accounts, we stop, assess, and restructure before the next milestone payment is released. We do not spend your money on a theory. We spend it on a proof.
              - generic [ref=e2312]: Risk Mitigation
        - generic [ref=e2313]:
          - generic [ref=e2314]:
            - generic [ref=e2315]: Q 3
            - generic [ref=e2316]: How long before I start making money?
          - generic [ref=e2317]:
            - generic [ref=e2318]: "Under the recommended Tier 2 scenario: breakeven is targeted between Month 8 and Month 11."
            - generic [ref=e2319]:
              - text: The revenue projection model shows Month 1–4 as investment-heavy (production, branding, initial distribution).
              - strong [ref=e2320]: Revenue begins in Month 2.
              - text: It accelerates from Month 5 as digital channels compound and gym reorders begin. The model reaches monthly breakeven at approximately $12,500 in net monthly revenue — achievable at 2,780 units sold per month across the distribution footprint. Full investment recovery is projected in the 18–22 month range under conservative ROAS assumptions. This is consumer goods velocity, not a startup moonshot.
              - generic [ref=e2321]: Timeline & Returns
        - generic [ref=e2322]:
          - generic [ref=e2323]:
            - generic [ref=e2324]: Q 4
            - generic [ref=e2325]: What if I want to manage some parts of this myself?
          - generic [ref=e2326]:
            - generic [ref=e2327]: That is your decision entirely — and the mandate documents it precisely.
            - generic [ref=e2328]:
              - text: The scope section of the management mandate contains a clear division-of-responsibilities table. If you prefer to manage relationships with specific retailers directly, or handle logistics internally, we write that into the mandate and adjust the budget accordingly.
