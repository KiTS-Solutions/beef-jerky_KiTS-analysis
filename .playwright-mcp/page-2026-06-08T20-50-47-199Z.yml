            - generic [ref=e2334]: What is the minimum I can invest to get started?
          - generic [ref=e2335]:
            - generic [ref=e2336]: Tier 1 at $24,000 is the viable minimum. Ru'ya 360°'s recommendation is Tier 2 at $62,000.
            - generic [ref=e2337]:
              - text: Tier 1 covers production, Halal certification, packaging, and direct gym distribution only. It is viable — but it has no digital presence budget, no e-commerce infrastructure, and no marketing investment beyond physical placement.
              - strong [ref=e2338]: It will generate sales, but it will not build a brand.
              - text: "Tier 2 adds the full digital layer: Meta advertising, influencer program, e-commerce channel, and events. Brand-building at that level is what converts a product into an asset. If $24,000 is today's ceiling, Tier 1 is the honest answer. If the goal is a brand that qualifies for GCC expansion in 18 months, Tier 2 is the answer."
