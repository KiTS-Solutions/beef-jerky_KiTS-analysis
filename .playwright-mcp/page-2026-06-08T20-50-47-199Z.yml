        - paragraph [ref=e1130]: STRIKE BITES enters through the Lebanese gym and fitness channel — not through modern trade. This is deliberate. Gym channel placement creates the brand story before supermarket shelf space. Fitness trainers who believe in the product become a zero-salary sales force. Modern trade and GCC export open only after the Lebanese consumer market has validated the product at scale.
