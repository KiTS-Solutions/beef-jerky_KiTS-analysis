                - paragraph [ref=e65]: "Honest jerky crafted the same way since day one — real ingredients, 100% grass-fed beef & protein to power your hustle. Where it all began: at the roadside stand."
                - paragraph [ref=e66]: In 1977, a butcher and artisan named Celestino “Charlie” Mirarchi started making jerky. Charlie was definitely a hustler. In fact, he was so busy making jerky that he couldn’t devote much time to selling it. So, his beef jerky remained a hidden gem—until Eugene and Susan Kang discovered it at a roadside stand on a trip to the Grand Canyon. They loved the jerky so much they decided to track down the maker. Soon, the trio went into business together as Country Archer —with a mission to share their meaty secret with the world.
                - paragraph [ref=e67]: Slowly but surely, more and more people found Country Archer grass-fed beef jerky, and our meat snacks found their way into grocery stores nationwide. Even though we’ve grown, we’re using the same jerky recipe and still craft each batch of jerky in-house. The only change is our commitment to using only 100% grass-fed beef, natural turkey, antibiotic-free pork, and real ingredients. We also taste our jerky every day and put it through the same rigor since day one because we’re serious about our meat snacks (but never too serious about ourselves).
