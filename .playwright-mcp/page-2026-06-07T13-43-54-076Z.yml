                - generic [ref=e2315]: §01 · MARKETING & E-MARKETING STRATEGY
                - heading "The Strategy That Makes STRIKE a Trend" [level=2] [ref=e2316]
                - paragraph [ref=e2317]: A brand that is only known in the gym cannot scale. A brand that is felt on the street, seen on every feed, and spoken about in every WhatsApp group becomes a cultural fixture — and a cultural fixture sells itself. This is the framework for making STRIKE inevitable.
              - generic [ref=e2319]:
                - generic [ref=e2320]: STRATEGIC POSITION
                - paragraph [ref=e2321]: STRIKE's go-to-market is correctly physical-first. This document does not change that. What it adds is the digital amplification layer that transforms a product sold in 30 gyms into a brand that 300,000 Lebanese fitness consumers know, want, and seek out — before they ever see it on a shelf.
              - generic [ref=e2322]:
                - generic [ref=e2323]:
                  - generic [ref=e2324]:
                    - generic [ref=e2325]: ◈
                    - generic [ref=e2326]: Physical-First. Digital-Amplified.
                  - paragraph [ref=e2327]: 82.6% of MENA sports nutrition purchases are in-store. The handshake closes the deal. Digital is the megaphone that makes the handshake mean something before it happens.
                - generic [ref=e2328]:
                  - generic [ref=e2329]:
                    - generic [ref=e2330]: ◉
                    - generic [ref=e2331]: Build the Trend. Not Just the Brand.
                  - paragraph [ref=e2332]: Beef jerky is a non-essential snack. In Lebanon, non-essential wins when it feels inevitable — when everyone at the gym has seen it, talked about it, and wants to be the one who introduced it.
                - generic [ref=e2333]:
                  - generic [ref=e2334]:
                    - generic [ref=e2335]: ◇
                    - generic [ref=e2336]: Community Before Commerce.
                  - paragraph [ref=e2337]: Sell to the gym community, the trainer network, and the macro-tracking community — not to a generic audience. The first 1,000 customers build the brand more than any ad campaign.
                - generic [ref=e2338]:
                  - generic [ref=e2339]:
                    - generic [ref=e2340]: ▣
                    - generic [ref=e2341]: Organic Engine. Paid Accelerant.
                  - paragraph [ref=e2342]: Organic content builds the brand. Paid ads accelerate what's already working. Never run paid ads on content that hasn't proven organic traction first. This sequencing saves budget and improves ROAS 3×.
                - generic [ref=e2343]:
                  - generic [ref=e2344]:
                    - generic [ref=e2345]: ◆
                    - generic [ref=e2346]: WhatsApp is Your CRM.
                  - paragraph [ref=e2347]: In Lebanon, WhatsApp is where business happens. A well-managed WhatsApp Business account is worth more than a sophisticated CRM system. Every customer interaction starts and ends there.
                - generic [ref=e2348]:
                  - generic [ref=e2349]:
                    - generic [ref=e2350]: ◐
                    - generic [ref=e2351]: Lebanese Pride. GCC-Ready From Day One.
                  - paragraph [ref=e2352]: Every piece of content should be producible in Arabic + English. Every digital asset should be structurally export-ready. The Lebanese story IS the GCC marketing asset — document it from the beginning.
